<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    text-align:center;
    overflow-x:hidden;
}

h1{
    margin-top:40px;
    color:white;
    font-size:50px;
}

.message{
    color:white;
    font-size:22px;
    margin:20px;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.gallery img{
    width:250px;
    height:320px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

.heart{
    position:fixed;
    color:red;
    font-size:25px;
    animation:float 5s linear infinite;
}

@keyframes float{
    0%{
        transform:translateY(100vh);
        opacity:1;
    }
    100%{
        transform:translateY(-100vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<h1>🎉 Happiest Birthday Cutipie 🎂</h1>

<div class="message">
Wishing you endless smiles and happiness 💖
</div>

<div class="gallery">
    <img src="image.jpg">
    <img src="image.jpg">
    <img src="image.jpg">
</div>

<script>
function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
